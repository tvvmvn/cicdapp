name: Java CI/CD with Docker and EC2

on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 push되면 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 깃허브 로봇이 소스 코드를 가져옴
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 자바 17 세팅
    - name: Set up JDK 24
      uses: actions/setup-java@v4
      with:
        java-version: '24'
        distribution: 'temurin'

    # 3. Gradle 빌드 권한 부여 후 빌드
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew clean build -x test

    # 4. 도커 허브 로그인
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 5. 도커 이미지 빌드 및 푸시
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/cicdapp:latest

    # 6. EC2 원격 접속 후 배포 명령어 실행
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 기존 컨테이너가 돌고 있으면 끄고 삭제
          docker stop spring-web-app || true
          docker rm spring-web-app || true
          
          # 안 쓰는 찌꺼기 이미지 삭제
          docker image prune -f
          
          # 최신 이미지 갱신 후 실행
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cicdapp:latest
          docker run -d -p 8080:8080 --name spring-web-app ${{ secrets.DOCKERHUB_USERNAME }}/cicdapp:latest