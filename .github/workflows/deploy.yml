name: Java CI/CD with Docker and EC2

on:
  push:
    branches: [ "main" ] # main 브랜치에 코드가 push되면 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 깃허브 로봇이 가상 환경으로 소스 코드를 가져옴
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 깃액션 가상 서버에 자바 24 세팅 (빌드용)
    - name: Set up JDK 24
      uses: actions/setup-java@v4
      with:
        java-version: '24'
        distribution: 'temurin'

    # 3. Gradle 빌드 권한 부여 후 빌드
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew clean build -x test # 빠른 배포를 위해 테스트는 제외

    # 4. 도커 허브 로그인
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 5. 도커 이미지 빌드 및 푸시
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/cicdapp:latest

    # 5-1. docker-compose.yml 파일을 EC2 배포 폴더로 안전하게 전송 (SCP)
    - name: Transfer docker-compose.yml to EC2
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "docker-compose.yml"
        target: "/home/${{ secrets.EC2_USERNAME }}/app"

    # 6. EC2 원격 접속 후 도커 컴포즈 가동 (SSH)
    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 배포 폴더로 이동
          cd /home/${{ secrets.EC2_USERNAME }}/app
          
          # 💡 핵심: GitHub Secrets 기반으로 안전하게 실시간 현지 환경변수(.env) 파일 생성
          echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" > .env
          # 새 환경 변수를 그 아래에 추가합니다(>>)
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          
          # 기존 컴포즈 컨테이너 종료 (떠있던 구버전 앱 다운)
          docker-compose down || true
          
          # 찌꺼기 이미지 제거 후 도커허브로부터 신규 최신 이미지 다운로드
          docker image prune -f
          docker-compose pull
          
          # 💡 도커 컴포즈 백그라운드 원버튼 기동 수행
          docker-compose up -d