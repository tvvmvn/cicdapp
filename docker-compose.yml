version: '3.8'

services:
  # 1. MySQL 데이터베이스 서비스
  mysql-db:
    image: mysql:latest
    container_name: mysql-container
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
      - MYSQL_DATABASE=cicdapp_db # 💡 컨테이너가 처음 생성될 때 이 이름의 DB를 자동으로 만들어줍니다.
    restart: always

  # 2. 스프링 부트 웹 앱 서비스
  web-app:
    image: ${DOCKERHUB_USERNAME}/cicdapp:latest
    container_name: spring-web-app
    ports:
      - "8080:8080" # 💡 기존 host 모드 대신 포트 포워딩 방식으로 변경 (스프링 포트에 맞게 조정 가능)
    environment:
      - DB_HOST=mysql-db # 💡 중요! 이제 127.0.0.1 대신 위 mysql 서비스 이름을 적어주면 도커가 알아서 연결합니다.
      - DB_NAME=cicdapp_db
      - DB_PASSWORD=${DB_PASSWORD}
    restart: always
    depends_on:
      - mysql-db # 💡 DB가 먼저 완벽하게 켜진 후에 스프링이 실행되도록 순서를 강제합니다.